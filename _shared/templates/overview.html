<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- PROJECT_NAME --> — Tổng Quan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/theme.css">
</head>
<body class="dark">

<!-- === DASHBOARD_CONFIG === Agent: customize per project -->
<script>
window.DASHBOARD_CONFIG = {
  name: 'Project Name',
  subtitle: 'Project subtitle',
  emoji: '📊',
  accent: '#818cf8',
  statusBadge: { text: '● Active', bg: 'rgba(34,197,94,0.2)', color: '#22c55e' },
  pages: [
    { href: 'index.html',      icon: '🏠', label: 'Tổng Quan' },
    { href: 'tasks.html',      icon: '✅', label: 'Tasks' },
    { href: 'milestones.html', icon: '🎯', label: 'Milestones' },
    { href: 'decisions.html',  icon: '⚡', label: 'Quyết Định' },
    { href: 'timeline.html',   icon: '📅', label: 'Timeline' },
    { href: 'team.html',       icon: '👥', label: 'Team' },
  ],
};
</script>
<div id="topnav"></div>
<div id="bottomnav"></div>

<!-- === HERO === -->
<div class="hero">
  <div class="container" style="padding:3rem 1rem 2.5rem">
    <!-- Status pill -->
    <div style="text-align:center;margin-bottom:1rem">
      <span class="badge badge-info" style="font-size:0.8rem;padding:4px 12px">
        <!-- STATUS_TEXT: e.g. "Sprint 2 đang chạy — 22/03 → 28/03" -->
      </span>
    </div>
    <h1 class="gradient-text" style="text-align:center;font-size:2.5rem;font-weight:800">
      <!-- PROJECT_NAME -->
    </h1>
    <p style="text-align:center;color:var(--text-muted);margin-top:0.5rem">
      <!-- PROJECT_SUBTITLE / PHASE INFO -->
    </p>
    <!-- KPI Cards -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-top:2rem;max-width:800px;margin-left:auto;margin-right:auto">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent)"><!-- 15/51 --></div>
        <div class="stat-label">Tasks Hoàn Thành</div>
        <div class="stat-label"><!-- 29% tiến độ --></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--danger)"><!-- 10 --></div>
        <div class="stat-label">Tasks Trễ Deadline</div>
        <div class="stat-label" style="color:var(--danger)"><!-- ● CRITICAL --></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--warning)"><!-- M2 --></div>
        <div class="stat-label">Milestone Hiện Tại</div>
        <div class="stat-label" style="color:var(--danger)"><!-- 🚫 UAT MISSED --></div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--success)"><!-- 01/04 --></div>
        <div class="stat-label">Go-live Target</div>
        <div class="stat-label" style="color:var(--warning)"><!-- ⚠ AT RISK --></div>
      </div>
    </div>
  </div>
</div>

<div class="container" style="padding-top:2rem">

  <!-- === SPRINT PROGRESS === -->
  <h2 class="section-header">🚀 Sprint Progress</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:2rem">

    <!-- Sprint card template — duplicate per sprint -->
    <div class="sprint-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
        <strong><!-- Tuần 1 — Sprint 1 --></strong>
        <span class="badge badge-warning"><!-- ⚠ 5 OVERDUE --></span>
      </div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem"><!-- 15/03 → 21/03/2026 --></div>
      <div class="progress-bar"><div class="progress-fill" style="width:46%;background:var(--info)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem">
        <span><!-- 11/24 tasks done (46%) --></span>
        <span style="color:var(--danger)"><!-- 5 overdue còn lại --></span>
      </div>
      <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">
        <!-- Scope & context notes -->
      </div>
    </div>

  </div>

  <!-- === MILESTONES === -->
  <h2 class="section-header">🎯 Milestones</h2>
  <div style="margin-bottom:2rem;padding-left:0.5rem">

    <!-- Milestone item template — duplicate per milestone -->
    <div class="milestone-item done">
      <div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span style="font-size:1.5rem;font-weight:800;color:var(--text-muted)">M1</span>
          <strong><!-- Scope & Risk Lock --></strong>
          <span class="badge badge-success"><!-- ✅ RECOVERED --></span>
          <span style="font-size:0.75rem;color:var(--text-muted)"><!-- 15-17/03 → recovered 22/03 --></span>
        </div>
        <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem">
          <!-- Gate: Khóa 6 critical decisions | ✅ 10+ decisions chốt meeting 22/03 -->
        </div>
      </div>
    </div>

  </div>

  <!-- === CHARTS === -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;margin-bottom:2rem">
    <div class="card">
      <h3 class="section-header" style="font-size:1rem">🍩 Phân Bổ Task Status</h3>
      <canvas id="statusChart" height="200"></canvas>
    </div>
    <div class="card">
      <h3 class="section-header" style="font-size:1rem">📊 Phân Bổ Priority</h3>
      <canvas id="priorityChart" height="200"></canvas>
    </div>
  </div>

  <!-- === CRITICAL ALERTS === -->
  <h2 class="section-header">🚨 Cảnh Báo Quan Trọng</h2>
  <div style="margin-bottom:2rem">

    <!-- Alert template — duplicate per alert -->
    <div class="alert alert-danger">
      <div style="flex:1">
        <div style="font-weight:700;color:var(--danger)"><!-- R11 — PILOT 29/03 DELAY CONFIRMED --></div>
        <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.25rem">
          <!-- Description and recommended action -->
        </div>
      </div>
      <a href="tasks.html" class="badge badge-danger" style="text-decoration:none;white-space:nowrap">Xem Tasks</a>
    </div>

  </div>

</div>

<!-- === CHARTS JS === Agent: update data arrays -->
<script>
// Status donut
new Chart(document.getElementById('statusChart'), {
  type: 'doughnut',
  data: {
    labels: ['Done', 'In Progress', 'Overdue', 'Pending'],
    datasets: [{ data: [15, 1, 10, 25], backgroundColor: ['#22c55e','#3b82f6','#ef4444','#71717a'] }]
  },
  options: { responsive: true, plugins: { legend: { position: 'top', labels: { color: '#a1a1aa', font: { size: 11 } } } } }
});
// Priority bar
new Chart(document.getElementById('priorityChart'), {
  type: 'bar',
  data: {
    labels: ['Tuần 1', 'Tuần 2', 'Tuần 3'],
    datasets: [
      { label: 'P0', data: [14, 6, 0], backgroundColor: '#ef4444' },
      { label: 'P1', data: [10, 4, 0], backgroundColor: '#eab308' },
    ]
  },
  options: { responsive: true, scales: { x: { ticks: { color: '#71717a' } }, y: { ticks: { color: '#71717a' }, beginAtZero: true } }, plugins: { legend: { labels: { color: '#a1a1aa' } } } }
});
</script>
<script src="../_shared/nav.js"></script>
</body>
</html>
